apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: staged-release
on:
  workflow_dispatch:
metadata:
  stages/v1alpha1:
    - name: Release Readiness
      jobs:
        - create-release-ticket
        - gather-evidence
        - quality-gate-check
        - update-jira-status
        - checkout-and-sast-scan
        - policy-check-release-readiness
        - trivy-security-scan
        - approval
    - name: Quality Assurance
      jobs:
        - helm-deploy
        - unify-fm
        - playwright-e2e-tests
        - performance-tests
        - policy-check-qa
    - name: Staging
      jobs:
        - create-release
        - argocd-deploy
        - enable-beta-features
        - smoke-tests
        - rollback-check
        - policy-check-staging
    - name: Production
      jobs:
        - servicenow-approval
        - blue-green-deploy
        - prod-smoke-tests
        - gradual-feature-rollout
        - policy-check-production
jobs:
  create-release-ticket:
    steps:
      - run: echo "Creating release ticket"
        uses: docker://golang:1.26.3
        shell: sh
  gather-evidence:
    steps:
      - uses: docker://alpine:3.20
        run: echo "Gathering release evidence"
  quality-gate-check:
    steps:
      - uses: docker://alpine:3.20
        run: echo "Running quality gate check"
  update-jira-status:
    steps:
      - uses: docker://alpine:3.20
        run: echo "Updating JIRA status"
  checkout-and-sast-scan:
    outputs:
      policy-subject: ${{ steps.snyk-sast-scan.outputs.policy-subject }}
    steps:
      - with:
          provider: github
          repository: https://github.com/Dev-Org-Hari/webrtc-go
          ref: main
          path: webrtc-repo
        uses: cloudbees-io/checkout@v1
        name: Checkout Component 1
      - with:
          snyk-token: b805f82c-36ef-4f7d-aee5-16bfaa718f75
          org-id: cloudbees-compliance-partner-development
          workspace-dir: webrtc-repo
        uses: cloudbees-io/snyk-sast-plugin@v1
        name: Run Snyk Sast Scan
      - with:
          path: gosec-count
          provider: github
          repository: https://github.com/fintech-bank-1/gosec-count
          ref: main
        uses: cloudbees-io/checkout@v1
        name: Chekout Component 2
      - with:
          snyk-token: b805f82c-36ef-4f7d-aee5-16bfaa718f75
          org-id: cloudbees-compliance-partner-development
          workspace-dir: gosec-count
        uses: cloudbees-io/snyk-sast-plugin@v1
        name: Run Snyk Sast Scan
        id: snyk-sast-scan
  policy-check-release-readiness:
    needs: checkout-and-sast-scan
    steps:
      - with:
          policy-id: 33f56ece-598b-4bf5-ba48-f050e9da7914
          input-data: ${{ needs.checkout-and-sast-scan.outputs.policy-subject }}
        uses: cloudbees-io/policy-utils/evaluate-policy@v0.1
        name: policy-evaluation
  trivy-security-scan:
    steps:
      - uses: docker://alpine:3.20
        run: |
          echo "Policy Subject: ${{ needs.checkout-and-sast-scan.outputs.policy-subject }}"
    needs: policy-check-release-readiness
  approval:
    needs:
      - create-release-ticket
      - gather-evidence
      - quality-gate-check
      - update-jira-status
      - checkout-and-sast-scan
      - trivy-security-scan
    timeout-minutes: 4320
    delegates: cloudbees-io/manual-approval/custom-job.yml@v1
    with:
      instructions: Approve release readiness to proceed to QA.
      disallowLaunchByUser: false
      approvers: release-managers
      notifyAllEligibleUsers: false
  helm-deploy:
    needs: approval
    steps:
      - uses: docker://alpine:3.20
        run: echo "Deploying via Helm to QA environment"
  unify-fm:
    needs: approval
    steps:
      - uses: docker://alpine:3.20
        run: echo "Running Unify FM checks"
  playwright-e2e-tests:
    needs: approval
    steps:
      - uses: docker://alpine:3.20
        run: echo "Running Playwright E2E tests"
  performance-tests:
    needs: approval
    steps:
      - uses: docker://alpine:3.20
        run: echo "Running performance tests"
  policy-check-qa:
    needs:
      - helm-deploy
      - unify-fm
      - playwright-e2e-tests
      - performance-tests
    steps:
      - uses: docker://alpine:3.20
        run: echo "Evaluating policies - High CVE Notification (NOTIFY)"
  create-release:
    needs:
      - policy-check-qa
    steps:
      - uses: docker://alpine:3.20
        run: echo "Creating release for staging"
  argocd-deploy:
    needs:
      - create-release
    steps:
      - uses: docker://alpine:3.20
        run: echo "Deploying to staging via ArgoCD"
  enable-beta-features:
    needs:
      - create-release
    steps:
      - uses: docker://alpine:3.20
        run: echo "Enabling beta features in staging"
  smoke-tests:
    needs:
      - argocd-deploy
      - enable-beta-features
    steps:
      - uses: docker://alpine:3.20
        run: echo "Running smoke tests on staging"
  rollback-check:
    needs:
      - argocd-deploy
      - enable-beta-features
    steps:
      - uses: docker://alpine:3.20
        run: echo "Running rollback check on staging"
  policy-check-staging:
    needs:
      - smoke-tests
      - rollback-check
    steps:
      - uses: docker://alpine:3.20
        run: echo "Evaluating policies - Production Readiness (PAUSE & NOTIFY)"
  servicenow-approval:
    needs:
      - policy-check-staging
    steps:
      - uses: docker://alpine:3.20
        run: echo "ServiceNow approval submitted"
  blue-green-deploy:
    needs:
      - servicenow-approval
    steps:
      - uses: docker://alpine:3.20
        run: echo "Running blue-green deployment to production"
  prod-smoke-tests:
    needs:
      - blue-green-deploy
    steps:
      - uses: docker://alpine:3.20
        run: echo "Running production smoke tests"
  gradual-feature-rollout:
    needs:
      - blue-green-deploy
    steps:
      - uses: docker://alpine:3.20
        run: echo "Gradual feature rollout in production"
  policy-check-production:
    needs:
      - prod-smoke-tests
      - gradual-feature-rollout
    steps:
      - uses: docker://alpine:3.20
        run: echo "Evaluating policies - Production deployment complete"
